<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /*
    Source for store-assets/feature-graphic-1024x500.png (the Google Play
    "Feature graphic" / "Gráfico de funciones"). Rendered by
    scripts/feature-graphic/generate.mjs with headless Chromium; the
    {{PLACEHOLDERS}} are filled from src/marketing/copy.json so the banner never
    drifts from the marketing page. Do not edit the committed PNG by hand —
    change copy.json (or this template) and regenerate with
    `npm run store:feature`.

    Play crops the feature graphic on some surfaces and may overlay a play
    button in the centre when it fronts a video, so the composition keeps the
    logo/headline in the left two-thirds and nothing critical dead-centre.
  */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  html { background: #0f172a; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(900px 560px at 80% -20%, #1e293b 0%, #0f172a 58%), #0f172a;
    color: #f1f5f9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 72px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: -200px; right: -140px;
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(249,115,22,0.30) 0%, rgba(249,115,22,0) 70%);
  }
  .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 26px; }
  .brand svg { width: 58px; height: auto; }
  .brand span { font-size: 29px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  h1 {
    font-size: 54px; line-height: 1.05; font-weight: 800;
    letter-spacing: -1.4px; color: #fff; max-width: 740px;
  }
  h1 .accent { color: #fb923c; }
  p { margin-top: 22px; font-size: 24px; line-height: 1.38; color: #94a3b8; max-width: 640px; }
  .pills { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; }
  .pill {
    font-size: 19px; font-weight: 600; color: #e2e8f0;
    background: #1e293b; border: 1px solid #334155;
    padding: 10px 18px; border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="brand">
    <!-- Pulse Stride mark (src/components/BrandLogo.tsx), viewBox 0 0 220 120 -->
    <svg viewBox="0 0 220 120" fill="none">
      <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28"
        stroke="#fb923c" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="200" cy="28" r="12" fill="#fb923c" />
    </svg>
    <span>{{BRAND}}</span>
  </div>
  <h1>{{HERO1}}<br /><span class="accent">{{HERO2}}</span></h1>
  <p>{{TAGLINE}}</p>
  <div class="pills">{{PILLS}}</div>
</body>
</html>
