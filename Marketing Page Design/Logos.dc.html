<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#0B1220; font-family:'Archivo',sans-serif; }
a { color:#F97316; } a:hover { color:#FDBA74; }
</style>
</helmet>
<section style="display:flex; flex-wrap:wrap; gap:32px; padding:48px;" data-screen-label="Logo options">

  <div id="1a" style="width:520px; background:#0F1826; border:1px solid #1E2A3D; border-radius:16px; padding:32px; display:flex; flex-direction:column; gap:28px;">
    <div style="display:flex; align-items:center; gap:12px;">
      <span style="background:#F97316; color:#0B1220; font-weight:800; font-size:13px; padding:3px 10px; border-radius:99px;">1a</span>
      <span style="color:#F1F5F9; font-weight:700; font-size:16px;">Pulse Stride</span>
      <span style="color:#8B98AC; font-size:13px;">heartbeat that rises into a finish</span>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; height:160px;">
      <svg width="220" height="120" viewBox="0 0 220 120" fill="none">
        <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#F97316" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <circle cx="200" cy="28" r="9" fill="#F97316"></circle>
      </svg>
    </div>
    <div style="display:flex; gap:24px; align-items:center;">
      <div style="width:96px; height:96px; border-radius:24px; background:linear-gradient(160deg,#F97316,#EA580C); display:flex; align-items:center; justify-content:center;">
        <svg width="64" height="40" viewBox="0 0 220 120" fill="none">
          <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#0B1220" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="200" cy="28" r="12" fill="#0B1220"></circle>
        </svg>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <svg width="44" height="26" viewBox="0 0 220 120" fill="none">
          <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#F97316" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="200" cy="28" r="12" fill="#F97316"></circle>
        </svg>
        <span style="color:#F1F5F9; font-weight:800; font-size:26px; letter-spacing:-0.5px;">Running Coach</span>
      </div>
    </div>
  </div>

  <div id="1b" style="width:520px; background:#0F1826; border:1px solid #1E2A3D; border-radius:16px; padding:32px; display:flex; flex-direction:column; gap:28px;">
    <div style="display:flex; align-items:center; gap:12px;">
      <span style="background:#F97316; color:#0B1220; font-weight:800; font-size:13px; padding:3px 10px; border-radius:99px;">1b</span>
      <span style="color:#F1F5F9; font-weight:700; font-size:16px;">Split</span>
      <span style="color:#8B98AC; font-size:13px;">forward chevrons — pace &amp; momentum</span>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; height:160px;">
      <svg width="160" height="120" viewBox="0 0 160 120" fill="none">
        <polyline points="20,20 70,60 20,100" stroke="#F97316" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <polyline points="80,20 130,60 80,100" stroke="#F97316" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"></polyline>
      </svg>
    </div>
    <div style="display:flex; gap:24px; align-items:center;">
      <div style="width:96px; height:96px; border-radius:24px; background:#0B1220; border:2px solid #F97316; display:flex; align-items:center; justify-content:center;">
        <svg width="52" height="40" viewBox="0 0 160 120" fill="none">
          <polyline points="20,20 70,60 20,100" stroke="#F97316" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <polyline points="80,20 130,60 80,100" stroke="#F97316" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"></polyline>
        </svg>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <svg width="34" height="26" viewBox="0 0 160 120" fill="none">
          <polyline points="20,20 70,60 20,100" stroke="#F97316" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <polyline points="80,20 130,60 80,100" stroke="#F97316" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"></polyline>
        </svg>
        <span style="color:#F1F5F9; font-weight:800; font-size:26px; letter-spacing:-0.5px;">Running Coach</span>
      </div>
    </div>
  </div>

  <div id="1c" style="width:520px; background:#0F1826; border:1px solid #1E2A3D; border-radius:16px; padding:32px; display:flex; flex-direction:column; gap:28px;">
    <div style="display:flex; align-items:center; gap:12px;">
      <span style="background:#F97316; color:#0B1220; font-weight:800; font-size:13px; padding:3px 10px; border-radius:99px;">1c</span>
      <span style="color:#F1F5F9; font-weight:700; font-size:16px;">Lap</span>
      <span style="color:#8B98AC; font-size:13px;">open track loop with a start dot</span>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; height:160px;">
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none">
        <circle cx="65" cy="65" r="48" stroke="#F97316" stroke-width="14" stroke-linecap="round" stroke-dasharray="240 62" transform="rotate(-58 65 65)"></circle>
        <circle cx="65" cy="17" r="11" fill="#34D399"></circle>
      </svg>
    </div>
    <div style="display:flex; gap:24px; align-items:center;">
      <div style="width:96px; height:96px; border-radius:24px; background:linear-gradient(160deg,#1B2740,#0B1220); border:1px solid #2A3A55; display:flex; align-items:center; justify-content:center;">
        <svg width="56" height="56" viewBox="0 0 130 130" fill="none">
          <circle cx="65" cy="65" r="48" stroke="#F97316" stroke-width="15" stroke-linecap="round" stroke-dasharray="240 62" transform="rotate(-58 65 65)"></circle>
          <circle cx="65" cy="17" r="12" fill="#34D399"></circle>
        </svg>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <svg width="28" height="28" viewBox="0 0 130 130" fill="none">
          <circle cx="65" cy="65" r="48" stroke="#F97316" stroke-width="15" stroke-linecap="round" stroke-dasharray="240 62" transform="rotate(-58 65 65)"></circle>
          <circle cx="65" cy="17" r="12" fill="#34D399"></circle>
        </svg>
        <span style="color:#F1F5F9; font-weight:800; font-size:26px; letter-spacing:-0.5px;">Running Coach</span>
      </div>
    </div>
  </div>

</section>

</x-dc>
</body>
</html>
