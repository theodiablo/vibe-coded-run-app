<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#060B14; font-family:'Archivo',sans-serif; }
a { color:#F97316; } a:hover { color:#FDBA74; }
</style>
</helmet>

<section style="display:flex; flex-direction:column; gap:48px; padding:48px;" data-screen-label="Play Store assets">

  <div style="display:flex; flex-direction:column; gap:16px;">
    <span style="color:#8B98AC; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;">App icon — 512 × 512</span>
    <div style="display:flex; gap:32px; align-items:flex-end;">
      <div style="width:512px; height:512px; border-radius:96px; background:linear-gradient(160deg,#F97316 0%,#EA580C 55%,#C2410C 100%); display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <svg width="360" height="220" viewBox="0 0 220 120" fill="none">
          <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#0B1220" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="200" cy="28" r="12" fill="#0B1220"></circle>
        </svg>
      </div>
      <div style="width:128px; height:128px; border-radius:28px; background:linear-gradient(160deg,#F97316,#C2410C); display:flex; align-items:center; justify-content:center;">
        <svg width="90" height="55" viewBox="0 0 220 120" fill="none">
          <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#0B1220" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="200" cy="28" r="12" fill="#0B1220"></circle>
        </svg>
      </div>
      <div style="width:64px; height:64px; border-radius:50%; background:linear-gradient(160deg,#F97316,#C2410C); display:flex; align-items:center; justify-content:center;">
        <svg width="44" height="27" viewBox="0 0 220 120" fill="none">
          <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#0B1220" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="200" cy="28" r="13" fill="#0B1220"></circle>
        </svg>
      </div>
    </div>
  </div>

  <div style="display:flex; flex-direction:column; gap:16px;">
    <span style="color:#8B98AC; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;">Feature graphic — 1024 × 500</span>
    <div style="width:1024px; height:500px; background:linear-gradient(120deg,#0B1220 0%,#131C2B 60%,#1E1108 100%); border-radius:8px; overflow:hidden; position:relative; display:flex; align-items:center;">
      <svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" style="position:absolute; inset:0; opacity:0.16;">
        <polyline points="-40,340 260,340 340,180 420,420 500,260 580,340 760,340 1080,60" stroke="#F97316" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
      <div style="position:relative; padding:0 72px; display:flex; flex-direction:column; gap:20px; max-width:560px;">
        <div style="display:flex; align-items:center; gap:14px;">
          <svg width="46" height="28" viewBox="0 0 220 120" fill="none">
            <polyline points="10,80 60,80 78,44 96,96 114,60 132,80 160,80 200,28" stroke="#F97316" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></polyline>
            <circle cx="200" cy="28" r="12" fill="#F97316"></circle>
          </svg>
          <span style="color:#F1F5F9; font-weight:800; font-size:26px;">Running Coach</span>
        </div>
        <h1 style="margin:0; color:#F1F5F9; font-size:52px; font-weight:900; line-height:1.05; letter-spacing:-1.5px;">Your race plan, built around your life.</h1>
        <p style="margin:0; color:#B7C2D2; font-size:21px; font-weight:600;">Adaptive training plans · live GPS · a coach you can talk to</p>
      </div>
      <div style="position:absolute; right:56px; bottom:-170px; width:280px; border-radius:32px; border:9px solid #1B2740; background:#0B1220; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.6);">
        <img src="uploads/mobile/01-home.png" alt="Home screen" style="display:block; width:100%;">
      </div>
    </div>
  </div>

  <div style="display:flex; flex-direction:column; gap:16px;">
    <span style="color:#8B98AC; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;">Phone screenshots — 1080 × 1920 (shown at 50%)</span>
    <div style="display:flex; gap:24px;">

      <sc-for list="{{ shots }}" as="shot" hint-placeholder-count="5">
        <div style="width:540px; height:960px; background:linear-gradient(180deg,#131C2B 0%,#0B1220 100%); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; align-items:center; gap:36px; padding-top:56px; box-sizing:border-box; position:relative;">
          <div style="display:flex; flex-direction:column; gap:10px; align-items:center; text-align:center; padding:0 48px;">
            <span style="color:#F97316; font-weight:800; font-size:17px; letter-spacing:2px; text-transform:uppercase;">{{ shot.kicker }}</span>
            <span style="color:#F1F5F9; font-weight:900; font-size:38px; line-height:1.1; letter-spacing:-1px;">{{ shot.title }}</span>
          </div>
          <div style="width:340px; border-radius:36px 36px 0 0; border:9px solid #1B2740; border-bottom:none; background:#0B1220; overflow:hidden; box-shadow:0 -20px 50px rgba(249,115,22,0.12); flex:1;">
            <img src="{{ shot.img }}" alt="{{ shot.title }}" style="display:block; width:100%;">
          </div>
        </div>
      </sc-for>

    </div>
  </div>

</section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      shots: [
        { kicker: "Train with purpose", title: "A plan that counts down to race day", img: "uploads/mobile/01-home.png" },
        { kicker: "18 weeks, structured", title: "Base, build, peak, taper — done for you", img: "uploads/mobile/02-plan.png" },
        { kicker: "Life happens", title: "Ask your coach, get a safe adjustment", img: "uploads/mobile/03-coach-chat.png" },
        { kicker: "Every run counts", title: "Live GPS tracking, pace and elevation", img: "uploads/mobile/04b-live-gps-tracker.png" },
        { kicker: "Stay motivated", title: "Badges and stats that add up", img: "uploads/mobile/08-progress-badges.png" }
      ]
    };
  }
}
</script>
</body>
</html>
