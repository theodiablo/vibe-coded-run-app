apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "solutions.camboulive.run"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "solutions.camboulive.run"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Injected by CI (.github/workflows/android.yml): versionCode =
        // run_number*1000 + run_attempt (monotonic, and unique even across a
        // re-run of the same workflow run), versionName = the android-v* tag.
        // Local/debug builds fall back to 1 / "1.0".
        versionCode = (System.getenv("ANDROID_VERSION_CODE") ?: "1").toInteger()
        versionName = (System.getenv("ANDROID_VERSION_NAME") ?: "1.0")
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        // Release signing for Play. The CI workflow (.github/workflows/android.yml)
        // decodes ANDROID_KEYSTORE_BASE64 to app/release.keystore and passes the
        // passwords/alias as env vars. Guarded by file existence so local debug
        // builds (no keystore) still work — only signed when the keystore is present.
        release {
            def ksFile = file('release.keystore')
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            if (file('release.keystore').exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // WatchImportPlugin (local, in this module): read finished exercise sessions
    // from Health Connect. connect-client is pinned to the same version the
    // health-connect plugin resolves; coroutines back its suspend read APIs.
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.20"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    implementation "androidx.health.connect:connect-client:1.1.0-alpha02"
}

apply from: 'capacitor.build.gradle'

// Applied AFTER capacitor.build.gradle so it wins: pin this module to Java/Kotlin
// 17. Capacitor generates Java 21, but the app module's Kotlin runs on 1.8.20
// (matching the health-connect plugin) whose max JVM target is below 21 — an
// inconsistent Java-21/Kotlin-17 pair fails the build, so lower Java to 17 too.
android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
