name: Security scan (Semgrep)

# Static analysis gate: runs on every PR so insecure patterns are caught
# before they ship. Independent of the deploy workflow.
#
# Deliberately NOT re-run on push to main: every merge already had this exact
# scan pass on the PR's merge ref minutes earlier, and nothing on main consumes
# the result — it was pure duplicate spend. workflow_dispatch remains for an
# on-demand scan of main (e.g. after bumping the semgrep image or rule packs).
on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.166.0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Network-independent baseline that also locks in the dangerous patterns
      # removed during the security cleanup. Fails the job on any finding.
      - name: Local baseline rules
        run: semgrep scan --error --config .semgrep/rules.yml .

      # Broad coverage from the hosted rule packs (no Semgrep account needed).
      # Blocks the PR on ERROR-severity findings.
      - name: Registry rule packs
        run: >-
          semgrep scan --error
          --config p/javascript
          --config p/react
          --config p/secrets
          --config p/owasp-top-ten
          .
