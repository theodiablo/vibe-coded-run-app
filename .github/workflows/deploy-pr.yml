name: Deploy PR preview to S3

# Per-PR preview deploys. Each PR is built and synced to its own prefix in the
# same bucket as production: s3://<bucket>/<PR_PREFIX>/<number>/, reachable at
# https://<domain>/<PR_PREFIX>/<number>/. The folder is removed when the PR is
# closed.
#
# Security: this uses `pull_request` (NOT `pull_request_target`), so PRs opened
# from forks run with a read-only token and cannot assume the OIDC deploy role.
# On top of that, every job is gated on `author_association` so only the code
# owners — i.e. users with write access to the repo (OWNER/MEMBER/COLLABORATOR)
# — ever trigger an AWS deploy. Untrusted contributors get CI checks but no
# preview.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  # Manual re-deploy of a single PR's preview (e.g. to pick up a changed secret
  # without pushing a commit). workflow_dispatch can only be triggered by users
  # with write access, so it's safe to skip the author_association gate below.
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to (re)deploy a preview for
        required: true
        type: string

permissions:
  id-token: write       # OIDC: assume the AWS deploy role
  contents: read
  pull-requests: write  # post the preview URL as a PR comment

# One preview per PR; a new push supersedes the in-flight deploy.
concurrency:
  group: deploy-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  S3_BUCKET_NAME: run.camboulive.solutions
  CLOUDFRONT_DISTRIBUTION_ID: E42OGU5IVYJ14
  # Previews live under this prefix so they never collide with the production
  # build synced to the bucket root by deploy.yml.
  PR_PREFIX: pr
  PREVIEW_BASE_URL: https://run.camboulive.solutions

jobs:
  # ---- Deploy / update the preview on open, push, or reopen -----------------
  deploy:
    name: Deploy preview
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action != 'closed' &&
       (github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For a manual run there's no PR event context, so check out the PR's
          # head explicitly. On pull_request, github.sha is the synthetic merge
          # ref, so use the PR head SHA to keep the build and comment aligned.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr_number) || github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co
          # Inlined into the client bundle by Vite at build time. Domain-restricted
          # publishable key — see src/constants.ts. Set in repo Actions secrets.
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # "Find a route" loop-suggestion feature gate. A repo VARIABLE set to
          # "1" enables it; dormant unless set AND a MapTiler key is present
          # (the finder is pointless without map tiles). See docs/route-finder.md.
          VITE_ROUTE_SUGGEST: ${{ vars.VITE_ROUTE_SUGGEST }}
          # Same PostHog project as production, but tagged "preview" so this
          # traffic is filterable out of production insights — see docs/telemetry.md.
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          # Public support address for crash trace mailto links. Set as a repo variable.
          VITE_SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          # Polar OAuth client id (public). NB: previews get an ephemeral origin, so
          # the OAuth redirect only completes if that exact URL is also registered
          # in the Polar app — production (run.camboulive.solutions) is the real
          # test target. See docs/integrations-polar.md.
          VITE_POLAR_CLIENT_ID: ${{ vars.VITE_POLAR_CLIENT_ID }}
          VITE_APP_ENV: preview

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Sync preview to S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          # vite.config.ts sets `base: './'`, so the built index.html and assets
          # use relative paths and work unchanged when served from a subfolder.
          # `--delete` keeps the prefix in sync with the latest build only.
          aws s3 sync dist/ "s3://${S3_BUCKET_NAME}/${PR_PREFIX}/${PR_NUMBER}/" --delete

      - name: Invalidate CloudFront cache for this PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/${PR_PREFIX}/${PR_NUMBER}/*"

      - name: Comment preview URL on the PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const { PR_PREFIX, PREVIEW_BASE_URL, PR_NUMBER } = process.env;
            // Link straight to index.html: the CloudFront distribution only
            // resolves a default root object at `/`, not for subfolders, so a
            // bare `/pr/<number>/` would 404.
            const url = `${PREVIEW_BASE_URL}/${PR_PREFIX}/${PR_NUMBER}/index.html`;
            const marker = '<!-- pr-preview-deploy -->';
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(PR_NUMBER),
            });
            const sha = pull.head.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n🚀 **PR preview deployed**\n\n${url}\n\n<sub>Built from <a href="${runUrl}">run #${context.runNumber}</a> · PR head commit \`${sha}\`. Refreshed automatically on every push.</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(PR_NUMBER),
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(PR_NUMBER),
                body,
              });
            }

  # ---- Tear the preview down when the PR is closed/merged -------------------
  cleanup:
    name: Remove preview
    if: >-
      github.event.action == 'closed' &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Remove preview from S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          aws s3 rm "s3://${S3_BUCKET_NAME}/${PR_PREFIX}/${PR_NUMBER}/" --recursive

      - name: Invalidate CloudFront cache for this PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/${PR_PREFIX}/${PR_NUMBER}/*"

      - name: Comment teardown on the PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const { PR_PREFIX, PR_NUMBER } = process.env;
            const marker = '<!-- pr-preview-deploy -->';
            const body = `${marker}\n🧹 PR preview for \`${PR_PREFIX}/${PR_NUMBER}\` removed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(PR_NUMBER),
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(PR_NUMBER),
                body,
              });
            }
