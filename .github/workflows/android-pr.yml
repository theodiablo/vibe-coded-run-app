name: Build Android PR APK

# Builds an installable DEBUG APK for every PR so changes can be tested on a real
# device (the AAB from android.yml is for Play and can't be sideloaded). Debug
# builds are signed with the auto-generated debug key — no secrets required, so
# this also works for fork PRs (just without the MapTiler key / tiles).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: android-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: running-coach-pr${{ github.event.pull_request.number }}-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Post (and keep updated) a comment linking to the run's artifacts. Skipped
      # for fork PRs, whose pull_request token is read-only.
      - name: Comment with download link
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- android-pr-apk -->';
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '📱 **Android debug APK built for this PR**',
              '',
              `Download it from the [workflow run](${url}) → **Artifacts** → ` +
              '`running-coach-pr' + context.payload.pull_request.number + '-debug-apk`, ' +
              'unzip, and sideload `app-debug.apk` (see README → Android app → *Install a build on your phone*).',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }
