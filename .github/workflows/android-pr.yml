name: Build Android PR APK

# Builds an installable DEBUG APK for every PR so changes can be tested on a real
# device (the AAB from android.yml is for Play and can't be sideloaded). Debug
# builds are signed with the auto-generated debug key — no secrets required, so
# this also works for fork PRs (just without the MapTiler key / tiles).
on:
  pull_request:
    branches: [main]
  # Manual re-run (e.g. when a push doesn't fire the pull_request event).
  # Becomes available once this workflow is on the default branch.
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: android-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # On pull_request, github.sha is the synthetic merge ref. Build the
          # same PR head commit that the APK comment reports.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Capacitor 8 CLI requires Node >= 22.
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      # Restores the Gradle distribution, dependency caches AND the task-output
      # build cache (org.gradle.caching in android/gradle.properties) — this is
      # what turns the ~7 min cold Gradle step into an incremental one. This job
      # is READ-ONLY (setup-gradle's default off the default branch): GitHub
      # scopes each ref's cache to itself and only the default branch's cache is
      # readable everywhere, so PRs consume the cache seeded by android-main.yml
      # (a build on push to main) rather than each writing their own PR-scoped
      # copy. A brand-new PR before main has ever seeded is cold once, then warm.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # Tagged "preview" so PR-APK traffic is filterable out of production.
          # Empty (no-op) on fork PRs, which don't get secrets — that's fine.
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          # Public support address for crash trace mailto links. Set as a repo variable.
          VITE_SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          VITE_APP_ENV: preview

      - name: Sync Capacitor
        run: npx cap sync android

      # Build the installable debug APK and also run the optimized release path.
      # The latter catches R8/resource-shrinker *configuration* failures (bad keep
      # rules, missing classes) without release secrets. Note it does NOT prove
      # runtime correctness: R8 stripping a reflectively-used class/method still
      # produces a successful build, so a plugin broken by minification passes
      # here and only crashes on-device — validate release behaviour on a device.
      - name: Build debug APK and verify release bundle
        working-directory: android
        run: ./gradlew assembleDebug bundleRelease

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: running-coach-pr${{ github.event.pull_request.number }}-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          # Sideload APKs are only useful while the PR is fresh; the default
          # 90-day retention accumulates against the private-repo 500 MB
          # artifact-storage cap for no benefit.
          retention-days: 14

      # Post (and keep updated) a comment linking straight to the APK artifact.
      # Skipped for fork PRs, whose pull_request token is read-only.
      - name: Comment with download link
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Direct artifact download URL (requires GitHub login). Exposed by
          # actions/upload-artifact@v4.
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- android-pr-apk -->';
            const url = process.env.ARTIFACT_URL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
            const body = [
              marker,
              '📱 **Android debug APK built for this PR**',
              '',
              `**[⬇️ Download the APK](${url})** (GitHub login required) — unzip and ` +
              'sideload `app-debug.apk` (see README → Android app → *Install a build on your phone*).',
              '',
              `<sub>Built from <a href="${runUrl}">run #${context.runNumber}</a> · PR head commit \`${sha}\`. ` +
              'Refreshed automatically on every push.</sub>',
            ].join('\n');
            // Paginate ALL comments — on an active PR the bot's comment scrolls off
            // the first page, which would otherwise post a duplicate with a stale
            // URL instead of updating the existing one.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }
