name: Publish app version

# Flips the in-app "update available" switch — run this BY HAND once a store
# has actually published a build, not when the release workflow uploaded it.
#
# Background: the release workflow uploads to the Play internal track and
# TestFlight, then STAGES the shipped version in app_config.pending_version /
# pending_version_ios. Uploading is not publishing — Play promotion/rollout and
# App Store review happen later, per store, on the stores' own schedule — so
# advertising latest_version at upload time pointed users at an update the
# store couldn't serve yet. This workflow is the manual second half: when you
# see the build live in a store, run it for that platform and it promotes
# pending -> latest_version(_ios), which is what the app's update prompt
# compares against (src/App.tsx + src/utils/version.ts).
#
# Like the release workflow's dispatch path, this is phone-friendly: Actions →
# "Publish app version" → Run workflow in a mobile browser works.
#
# By default it publishes the staged pending version (and refuses to run if
# nothing is staged); the optional `version` input overrides it for repair
# work — e.g. re-announcing after a bad row edit, or rolling the advertised
# version back. min_supported_version stays hand-managed in Supabase.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which store just published the build
        required: true
        type: choice
        options: [android, ios, both]
        default: android
      version:
        description: "Version to announce (leave empty to promote the staged pending version)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-version
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # The Supabase CLI is a devDependency, so npx needs a real install.
      - name: Install dependencies
        run: npm ci

      - name: Promote pending version to latest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PLATFORM: ${{ inputs.platform }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add a Supabase personal/service access token with database query rights on run-app."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo variable is not set."
            exit 1
          fi

          # The version input is interpolated into SQL below — allow only a
          # plain dotted version (same shape the release workflow enforces).
          if [ -n "$VERSION_INPUT" ] && [[ ! "$VERSION_INPUT" =~ ^[0-9]+(\.[0-9]+){1,3}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Refusing to publish unexpected version name: $VERSION_INPUT"
            exit 1
          fi

          case "$PLATFORM" in
            android) PLATFORMS="android" ;;
            ios)     PLATFORMS="ios" ;;
            both)    PLATFORMS="android ios" ;;
            *) echo "::error::Unknown platform: $PLATFORM"; exit 1 ;;
          esac

          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"

          for p in $PLATFORMS; do
            if [ "$p" = "ios" ]; then LATEST="latest_version_ios"; PENDING="pending_version_ios"; else LATEST="latest_version"; PENDING="pending_version"; fi
            echo "::group::Publishing $p"
            # Promote in one atomic statement: explicit input wins, else the
            # staged pending value; refuse a no-op so a run with nothing staged
            # fails loudly instead of silently announcing nothing. The pending
            # marker is cleared only when it matches what was announced, so an
            # override never destroys a differently-staged version.
            npx supabase db query --linked "
              do \$\$
              declare v text;
              begin
                select coalesce(nullif('$VERSION_INPUT', ''), $PENDING)
                  into v from public.app_config where id = 1;
                if v is null then
                  raise exception 'Nothing to publish for $p: no $PENDING staged and no version input given.';
                end if;
                update public.app_config
                  set $LATEST = v,
                      $PENDING = case when $PENDING = v then null else $PENDING end,
                      updated_at = now()
                  where id = 1;
              end
              \$\$;"
            echo "::endgroup::"
          done

          # Show the resulting row so the run log doubles as an audit trail.
          npx supabase db query --linked \
            "select latest_version, pending_version, latest_version_ios, pending_version_ios, min_supported_version, min_supported_version_ios, updated_at from public.app_config where id = 1;"
          echo "Published ($PLATFORM). Outdated clients on the selected platform(s) will now see the update banner." >> "$GITHUB_STEP_SUMMARY"
