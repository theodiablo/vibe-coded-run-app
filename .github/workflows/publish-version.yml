name: Publish app version

# Flips the in-app "update available" switch — run this BY HAND once a store
# has actually published a build, not when the release workflow uploaded it.
#
# Background: the release workflow uploads to the Play internal track and
# TestFlight, then STAGES the shipped version in app_config.pending_version /
# pending_version_ios. Uploading is not publishing — Play promotion/rollout and
# App Store review happen later, per store, on the stores' own schedule — so
# advertising latest_version at upload time pointed users at an update the
# store couldn't serve yet. This workflow is the manual second half: when you
# see the build live in a store, run it for that platform and it promotes
# pending -> latest_version(_ios), which is what the app's update prompt
# compares against (src/App.tsx + src/utils/version.ts).
#
# Like the release workflow's dispatch path, this is phone-friendly: Actions →
# "Publish app version" → Run workflow in a mobile browser works.
#
# By default it publishes the staged pending version and refuses a platform
# with nothing staged; the optional `version` input overrides it for repair
# work — e.g. re-announcing after a bad row edit, or rolling the advertised
# version back. min_supported_version stays hand-managed in Supabase.
#
# Failure semantics for `both` on a partial release: each platform is
# attempted independently and the app_config audit row always prints, so a
# platform with nothing staged fails loudly WITHOUT starving the other
# platform's promotion — the run goes red, the errors name the platform(s),
# and the audit shows exactly what is now live.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which store just published the build
        required: true
        type: choice
        options: [android, ios, both]
        default: android
      version:
        description: "Version to announce (leave empty to promote the staged pending version)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-version
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Needed for the local validate-app-version action, not for npm — the
      # Supabase CLI runs via a pinned npx package below, so there is no
      # npm ci: installing the whole dev toolchain for two SQL statements
      # made every publish a multi-minute job.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same single-sourced version gate the release workflow's staging steps
      # use; the input is interpolated into SQL below, so nothing unvalidated
      # may pass. An empty input (promote the staged pending value) skips
      # this — the pending value itself never round-trips through the shell
      # into SQL (the UPDATE re-derives it in-database).
      - name: Validate version input
        if: ${{ inputs.version != '' }}
        uses: ./.github/actions/validate-app-version
        with:
          version: ${{ inputs.version }}

      - name: Promote pending version to latest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PLATFORM: ${{ inputs.platform }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add a Supabase personal/service access token with database query rights on run-app."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo variable is not set."
            exit 1
          fi

          # Pinned to the CLI major the repo's devDependency tracks; -y skips
          # the npx install prompt. No npm ci needed.
          CLI="supabase@2"
          q() { npx -y "$CLI" db query --linked "$1"; }

          npx -y "$CLI" link --project-ref "$SUPABASE_PROJECT_REF"

          # Deliberately does NOT trust `db query` exit codes or plpgsql RAISE
          # to fail the run (CLI error->exit-code behavior is not guaranteed):
          # every outcome is confirmed by reading a sentinel-tagged SELECT back
          # out of stdout. Sentinels are split ('RC_' || 'PICK=') so the marker
          # can only appear in RESULT rows, never in an echo of the query text.
          publish_one() {
            local p="$1" latest pending out picked
            if [ "$p" = "ios" ]; then
              latest="latest_version_ios"; pending="pending_version_ios"
            else
              latest="latest_version"; pending="pending_version"
            fi

            # What would be announced: explicit input wins, else staged pending.
            # Extraction is strict — only "(none)" or a version-shaped value —
            # so JSON/table quoting around the result row can't leak into it.
            out=$(q "select 'RC_' || 'PICK=' || coalesce(nullif('$VERSION_INPUT', ''), $pending, '(none)') from public.app_config where id = 1;") || out=""
            picked=$(grep -oE 'RC_PICK=(\(none\)|[0-9][0-9A-Za-z.+-]*)' <<<"$out" | head -n1 | cut -d= -f2- || true)
            if [ -z "$picked" ]; then
              echo "::error::$p: could not read public.app_config (unexpected query output)."
              return 1
            fi
            if [ "$picked" = "(none)" ]; then
              echo "::error::$p: nothing to publish — no $pending staged and no version input given."
              return 1
            fi

            # Promote in one statement. The version is re-derived inside the
            # query (explicit input, else pending) so no value read from the
            # database is ever interpolated back into SQL; the pending marker
            # is cleared only when it matches what was announced, so an
            # override never destroys a differently-staged version.
            q "update public.app_config
                 set $latest = coalesce(nullif('$VERSION_INPUT', ''), $pending),
                     $pending = case when $pending = coalesce(nullif('$VERSION_INPUT', ''), $pending) then null else $pending end,
                     updated_at = now()
               where id = 1
                 and coalesce(nullif('$VERSION_INPUT', ''), $pending) is not null;" || true

            # Positive verification: the column must now read back exactly as
            # the picked version, or this platform's publish is declared failed.
            local nowv
            out=$(q "select 'RC_' || 'NOW=' || $latest from public.app_config where id = 1;") || out=""
            nowv=$(grep -oE 'RC_NOW=[0-9][0-9A-Za-z.+-]*' <<<"$out" | head -n1 | cut -d= -f2- || true)
            if [ "$nowv" != "$picked" ]; then
              echo "::error::$p: verification failed — $latest reads back as '${nowv:-?}', expected '$picked'."
              return 1
            fi
            echo "$p: $latest -> $picked"
          }

          case "$PLATFORM" in
            android) PLATFORMS="android" ;;
            ios)     PLATFORMS="ios" ;;
            both)    PLATFORMS="android ios" ;;
            *) echo "::error::Unknown platform: $PLATFORM"; exit 1 ;;
          esac

          # Attempt every selected platform even if one fails, so `both` on a
          # partial release still promotes the store that actually shipped.
          FAILED=""
          for p in $PLATFORMS; do
            echo "::group::Publishing $p"
            if ! publish_one "$p"; then
              FAILED="$FAILED $p"
            fi
            echo "::endgroup::"
          done

          # The audit row always prints — even on failure — so the run log
          # shows exactly what is live after this run.
          echo "::group::app_config after this run"
          q "select latest_version, pending_version, latest_version_ios, pending_version_ios, min_supported_version, min_supported_version_ios, updated_at from public.app_config where id = 1;" || true
          echo "::endgroup::"

          if [ -n "$FAILED" ]; then
            echo "Publish FAILED for:$FAILED (see errors above; the audit row shows what is live)." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Published ($PLATFORM). Outdated clients on the selected platform(s) will now see the update banner." >> "$GITHUB_STEP_SUMMARY"
