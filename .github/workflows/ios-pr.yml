name: iOS PR compile check

# Compiles the iOS shell (including the local Swift plugins under ios/App/App/)
# for the Simulator on PRs that touch native-affecting files. No signing, no
# secrets — this is the only automated check on the Swift side, and it earns
# its macOS-runner cost by catching pbxproj/plugin breakage before a release.
# The web bundle is stubbed (Swift compilation doesn't read it), which keeps
# the job fast and secret-free for fork PRs.
on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-pr.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ios-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Capacitor 8 CLI requires Node >= 22.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Match release.yml's toolchain (App Store uploads require Xcode 26+, and
      # the macos-15 image defaults to 16.x) so "compiles on the PR" and
      # "compiles at release" are the same claim.
      - name: Select Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode 26.x on this runner image — keep this in sync with release.yml."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      # Swift compilation never reads the web bundle; a stub dist satisfies
      # `cap sync`'s webDir copy without building (or leaking secrets to) the
      # real web app.
      - name: Stub web assets
        run: mkdir -p dist && touch dist/index.html

      - name: Sync Capacitor
        run: npx cap sync ios

      # Cache the SPM package clones so xcodebuild skips the resolve/clone on
      # warm runs (saves minutes at the macOS ×10 multiplier). Keyed on the
      # synced CapApp-SPM manifest (cap sync rewrites it from package-lock.json,
      # which is why this step sits AFTER Sync Capacitor). Same key family as
      # release.yml's ios job so PR and release runs warm each other. The repo
      # name is part of the key because SwiftPM bakes the runner's absolute
      # workspace path (which contains the repo name) into SourcePackages state
      # — a cache from before a repo rename breaks the build with "no
      # XCFramework found at /Users/runner/work/<old-name>/...".
      - name: Cache SPM packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ios/SourcePackages
          key: spm-${{ runner.os }}-${{ github.event.repository.name }}-${{ hashFiles('ios/App/CapApp-SPM/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-${{ github.event.repository.name }}-

      - name: Build for Simulator (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath ios/SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions
