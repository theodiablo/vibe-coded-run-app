name: Deploy to S3 / CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::703323013899:role/GitHub-Actions-RunApp-deploy
  S3_BUCKET_NAME: run.camboulive.solutions
  CLOUDFRONT_DISTRIBUTION_ID: E42OGU5IVYJ14

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ env.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
