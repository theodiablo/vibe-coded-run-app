name: coach-agent live smoke

# On-demand only: never runs on push/PR, so it cannot burn API budget. It starts
# the local Supabase stack, serves the edge function with MOCK_LLM=1, and checks
# that the handler bundles, serves, and returns the expected unauthenticated 401.

on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: npx supabase start

      - name: Serve coach-agent with mock LLM
        run: |
          printf 'MOCK_LLM=1\nANTHROPIC_API_KEY=%s\n' "${ANTHROPIC_API_KEY:-}" > /tmp/coach.env
          npx supabase functions serve coach-agent --no-verify-jwt --env-file /tmp/coach.env &
          echo $! > /tmp/serve.pid
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for function endpoint
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://127.0.0.1:54321/functions/v1/coach-agent \
              -H 'content-type: application/json' -d '{"action":"propose"}' || true)
            echo "attempt $i: HTTP $code"
            [ "$code" != "000" ] && break
            sleep 2
          done

      - name: Assert unauthenticated request reaches handler
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            http://127.0.0.1:54321/functions/v1/coach-agent \
            -H 'content-type: application/json' -d '{"action":"propose"}')
          echo "coach-agent unauthenticated status: $code"
          test "$code" = "401"

      - name: Stop Supabase
        if: always()
        run: npx supabase stop || true
