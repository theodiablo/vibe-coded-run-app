name: Build Android app

# Manual / tag-triggered only — the Android app is released to the Play Store on
# its own cadence, independent of the web deploy (deploy.yml), even though both
# build from the same dist/. Not run on every push.
on:
  workflow_dispatch: {}
  push:
    tags: ["android-v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    # Defensive trigger gate. `on.push` is already limited to `android-v*` tags,
    # but in practice GitHub has been starting this workflow on ordinary branch
    # and `main` pushes too (e.g. every commit on a PR branch), producing noisy
    # failing 0.0.0 builds. Gate the job so it only ever runs for a real release
    # tag or a manual dispatch — never on a feature-branch or `main` push. If the
    # event still leaks through, the run shows up but the build is skipped.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/android-v') }}
    # The `secrets` context can't be used in step-level `if:` conditions
    # (GitHub evaluates `if:` before the job reaches the runner). Hoist the
    # secrets we branch on into job-level env vars and gate on `env.*` instead.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Capacitor 8 CLI requires Node >= 22.
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co
          # Same domain-restricted MapTiler key as the web deploy (see README → Maps).
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # Same PostHog project key as the web deploy (see docs/telemetry.md).
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          # Public support address for crash trace mailto links. Set as a repo variable.
          VITE_SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          # Released Android app — production telemetry (PR APKs tag "preview").
          VITE_APP_ENV: production
          # Native build: drop the web-only marketing landing chunk entirely so
          # the APK ships zero marketing bytes (see MarketingGate in src/App.tsx).
          VITE_NATIVE_BUILD: "1"

      # Web-only SEO assets are useless inside the APK (the native WebView is
      # never crawled) and would just bloat the download — strip them before the
      # Capacitor sync copies dist/ into the app. The marketing chunk itself is
      # already excluded at build time via VITE_NATIVE_BUILD.
      - name: Drop web-only SEO assets from the native bundle
        run: rm -f dist/og-image.png dist/robots.txt dist/sitemap.xml

      - name: Sync Capacitor
        run: npx cap sync android

      # versionName from the android-v* tag (e.g. android-v1.2.0 → 1.2.0);
      # dev/manual runs use 0.0.0. versionCode folds in run_attempt (not just
      # run_number) — a plain run_number repeats on a re-run of the same run,
      # and Google Play permanently rejects a re-used versionCode, so a retry
      # after a partial failure (AAB built/uploaded, a later step failed) would
      # otherwise fail every time with "Version code N has already been used."
      - name: Compute version name
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-v* ]]; then
            echo "name=${GITHUB_REF_NAME#android-v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.0" >> "$GITHUB_OUTPUT"
          fi
          echo "code=$(( GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT ))" >> "$GITHUB_OUTPUT"

      # Release signing. Store a base64 keystore + credentials as Actions secrets.
      # Debug builds need no signing; only release AABs uploaded to Play do.
      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.code }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: running-coach-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      # Push the signed AAB to Google Play. Only on a real release tag. Starts on
      # the internal track to validate the pipeline end-to-end; bump `track` to
      # production (and grant the service account the production-release
      # permission in Play Console) when you're ready to ship to users. Needs the
      # GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret (the service-account JSON key).
      - name: Deploy to Google Play
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: solutions.camboulive.run
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      # On a real release (android-v* tag), tell the app the new latest version so
      # outdated clients can be nudged to update. Uses the Supabase CLI with a
      # management access token, matching the Edge Function deploy workflow; no
      # service-role data API key is needed. min_supported_version is left for you
      # to bump by hand in Supabase when you ship a breaking change.
      - name: Publish latest version to Supabase
        if: startsWith(github.ref, 'refs/tags/android-v')
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add a Supabase personal/service access token with database query rights on run-app."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo variable is not set."
            exit 1
          fi

          if [[ ! "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){1,3}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Refusing to publish unexpected Android version name: $VERSION_NAME"
            exit 1
          fi

          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db query --linked \
            "update public.app_config set latest_version = '$VERSION_NAME', updated_at = now() where id = 1;"
          echo "Set latest_version=$VERSION_NAME"
