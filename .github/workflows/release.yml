name: Release mobile apps

# Unified, platform-agnostic release: one v* version (e.g. v1.4.0) builds the
# web bundle ONCE and ships Android (Play internal track) and iOS (TestFlight)
# in parallel from the same commit and version name. Manual / tag-triggered only
# — the mobile apps release on their own cadence, independent of the web deploy
# (deploy.yml), even though all build from the same dist/.
#
# TWO ways to cut a release, both landing in the same jobs:
#   1. workflow_dispatch — the mobile-friendly "just press a button" path. Open
#      Actions → "Release mobile apps" → Run workflow (works in a mobile
#      browser at github.com). The `prepare` job auto-computes the next version
#      from the latest v* tag (patch by default; pick minor/major, or type an
#      exact `version`), builds + uploads, then CREATES the v* tag and a GitHub
#      Release with auto-generated notes. No local git / desktop needed.
#      `dry_run: true` builds only (no upload, no tag) — the old manual-dispatch
#      smoke test.
#   2. push a v* tag from a desktop — same jobs; `prepare` reads the version
#      from the ref and the `tag` job attaches a GitHub Release to it.
# A tag created by the workflow's GITHUB_TOKEN does NOT recursively re-trigger
# the `push: tags` path (GitHub suppresses that), so the dispatch path runs the
# release exactly once.
#
# The platform jobs are independent (each needs only prepare + web-build), so an
# iOS failure never blocks the Android upload and vice versa; each job STAGES
# its OWN app_config pending-version column only after its own store upload
# succeeds. Staging does NOT show the in-app update prompt — a store upload
# still has to clear review/rollout before the build is installable, so the
# separate "Publish app version" workflow (publish-version.yml) is run by hand
# to promote pending -> latest_version(_ios) once the store actually publishes.
# "Re-run failed jobs" re-runs only the failed platform, and the build
# number folds in run_attempt, so the retry gets a fresh store build number
# (both Play and TestFlight permanently reject a re-used one).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump from the latest v* tag (ignored if 'version' is set)"
        type: choice
        default: patch
        options: [patch, minor, major]
      version:
        description: "Exact version override, e.g. 1.5.0 (leave blank to auto-bump)"
        type: string
        required: false
        default: ""
      dry_run:
        description: "Build only — no store upload, no tag/release"
        type: boolean
        default: false
  push:
    tags: ["v*"]

# Default the whole workflow to read-only; the `tag` job opts up to
# contents: write to create the tag + GitHub Release.
permissions:
  contents: read

jobs:
  # Resolve (and validate) the single version name for the whole run, so every
  # platform job builds the same one. On a v* tag push the version comes from
  # the ref; on dispatch it's the typed `version` or an auto-bump of the latest
  # v* tag. `is_release` is the one switch the platform jobs gate their store
  # uploads on (false only for a dry-run dispatch), replacing the old
  # per-job `startsWith(github.ref, 'refs/tags/v')` checks.
  prepare:
    runs-on: ubuntu-latest
    # Defensive trigger gate (inherited from the old android.yml): GitHub has
    # been observed starting tag-filtered workflows on ordinary branch pushes,
    # producing noisy failing 0.0.0 builds. Never run for those — and because
    # every other job `needs: prepare`, skipping here skips the whole release.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need the full tag list to auto-bump and to reject a duplicate.
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        env:
          BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # Dry-run dispatch: keep the old smoke-test behaviour (build only).
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Dry run — building only, no store upload and no tag."
            exit 0
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Version comes straight from the pushed tag.
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            # Explicit override wins over the bump. Tolerate a leading v.
            VERSION="${INPUT_VERSION#v}"
          else
            # Auto-bump the latest vMAJOR.MINOR.PATCH tag (legacy android-v* tags
            # don't start with 'v', so the glob skips them). No tags yet → 0.0.0.
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -n1)
            LATEST="${LATEST:-0.0.0}"
            IFS='.' read -r MA MI PA <<< "$LATEST"
            case "$BUMP" in
              major) MA=$((MA + 1)); MI=0; PA=0 ;;
              minor) MI=$((MI + 1)); PA=0 ;;
              *)     PA=$((PA + 1)) ;;
            esac
            VERSION="$MA.$MI.$PA"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION' — expected MAJOR.MINOR.PATCH (e.g. 1.5.0)."
            exit 1
          fi

          # On a fresh dispatch, never reuse an existing tag — the stores reject
          # a re-used build/version and it would silently no-op the release.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] \
             && git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "::error::Tag v$VERSION already exists — bump again or pass a higher version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: v$VERSION"

  web-build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Capacitor 8 CLI requires Node >= 22.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co
          # Same domain-restricted MapTiler key as the web deploy (see README → Maps).
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # "Find a route" loop-suggestion feature gate. A repo VARIABLE set to
          # "1" enables it; dormant unless set AND a MapTiler key is present
          # (the finder is pointless without map tiles). See docs/route-finder.md.
          VITE_ROUTE_SUGGEST: ${{ vars.VITE_ROUTE_SUGGEST }}
          # Same PostHog project key as the web deploy (see docs/telemetry.md).
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          # Public support address for crash trace mailto links. Set as a repo variable.
          VITE_SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          # Polar cloud import (public client id, repo VARIABLE — the secret half
          # lives in the polar-import edge function). Native connects open the
          # system browser and return via the polar-callback deep link; without
          # this the provider is dormant and the Polar row never renders in the
          # apps. Same variable as the web deploy (docs/integrations-polar.md).
          VITE_POLAR_CLIENT_ID: ${{ vars.VITE_POLAR_CLIENT_ID }}
          # Released native apps — production telemetry (PR builds tag "preview").
          VITE_APP_ENV: production
          # Native build: drop the web-only marketing landing chunk entirely so
          # the packages ship zero marketing bytes (see MarketingGate in src/App.tsx).
          VITE_NATIVE_BUILD: "1"

      # Web-only SEO assets are useless inside a native package (the WebView is
      # never crawled) and would just bloat the download — strip them before the
      # per-platform Capacitor syncs copy dist/ into the shells.
      - name: Drop web-only SEO assets from the native bundle
        run: rm -f dist/og-image.png dist/robots.txt dist/sitemap.xml

      # overwrite: artifacts are immutable per (run, name) since upload-artifact
      # v4 — without it, "re-run all jobs" 409s here before either store job can
      # even start.
      - name: Upload web bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-web-dist
          path: dist
          if-no-files-found: error
          overwrite: true

  android:
    runs-on: ubuntu-latest
    needs: [prepare, web-build]
    # The `secrets` context can't be used in step-level `if:` conditions
    # (GitHub evaluates `if:` before the job reaches the runner). Hoist the
    # secrets we branch on into job-level env vars and gate on `env.*` instead.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      # Read-only consumer of the Gradle cache seeded by android-main.yml (a
      # build on push to main). A release runs on a TAG ref, whose cache scope
      # is the tag itself — it can read the default branch's cache but not write
      # to it, so it never seeds; it just reuses what main built. If the tagged
      # commit's Android inputs match a recent main build (the usual case), the
      # AAB build restores from cache.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Install dependencies
        run: npm ci

      - name: Download web bundle
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: native-web-dist
          path: dist

      - name: Sync Capacitor
        run: npx cap sync android

      # versionName comes from the resolved release version (prepare job);
      # dry-run dispatch resolves it to 0.0.0. versionCode folds in run_attempt
      # (not just run_number) — a plain run_number repeats on a re-run of the
      # same run, and Google Play permanently rejects a re-used versionCode, so
      # a retry after a partial failure (AAB uploaded, a later step failed)
      # would otherwise fail every time with "Version code N has already been
      # used."
      # RUN_OFFSET: run_number is PER-WORKFLOW-FILE and reset to 1 when
      # android.yml became release.yml, but Play only accepts versionCodes above
      # the highest ever uploaded (49001+ from the old workflow). The +1000
      # offset restarts the sequence at 1_001_00x — far above anything the old
      # workflow could have produced. Never remove or shrink it.
      - name: Compute version name
        id: ver
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.version }}
        run: |
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          RUN_OFFSET=1000
          echo "code=$(( (GITHUB_RUN_NUMBER + RUN_OFFSET) * 1000 + GITHUB_RUN_ATTEMPT ))" >> "$GITHUB_OUTPUT"

      # Release signing. Store a base64 keystore + credentials as Actions secrets.
      # Debug builds need no signing; only release AABs uploaded to Play do.
      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.code }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # overwrite: a re-run of this job re-uploads the same artifact name, which
      # 409s on the immutable v4+ artifact store *before* the Play upload step —
      # exactly the retry path this job's run_attempt versioning exists for.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: running-coach-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          overwrite: true

      # Retain the R8 mapping for this release. minifyEnabled obfuscates the AAB,
      # so native crash stacks (PostHog captureError) come back renamed — the
      # mapping is the ONLY way to deobfuscate them, and it's regenerated per
      # build, so a lost mapping means permanently unreadable traces for that
      # version. Keyed by versionCode so each release's mapping is retrievable.
      - name: Upload R8 mapping
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: running-coach-mapping-${{ steps.ver.outputs.code }}
          path: android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          overwrite: true
          retention-days: 90

      # Push the signed AAB to Google Play. Only on a real release (not a
      # dry-run dispatch). Starts on the internal track to validate the pipeline
      # end-to-end; bump `track` to production (and grant the service account
      # the production-release permission in Play Console) when you're ready to
      # ship to users. Needs the GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret (the
      # service-account JSON key).
      - name: Deploy to Google Play
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: solutions.camboulive.run
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      # On a real release, STAGE the version the Play upload actually shipped —
      # never touching the *_ios columns (the ios job owns those). Staging does
      # NOT surface the in-app "update available" nudge: an upload still has to
      # clear Play review/rollout before users can install it, so latest_version
      # is only set later by the manual "Publish app version" workflow
      # (publish-version.yml) once the build is live in the store.
      # Uses the Supabase CLI with a management access token, matching the Edge
      # Function deploy workflow; no service-role data API key is needed.
      # min_supported_version is left for you to bump by hand in Supabase when
      # you ship a breaking change.
      # The version-shape gate is single-sourced in
      # .github/actions/validate-app-version (shared with the iOS job and
      # publish-version.yml) so the shape the staging and publishing SQL accept
      # can never drift apart.
      - name: Validate version name
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        uses: ./.github/actions/validate-app-version
        with:
          version: ${{ steps.ver.outputs.name }}

      - name: Stage Android version in Supabase (pending publish)
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add a Supabase personal/service access token with database query rights on run-app."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo variable is not set."
            exit 1
          fi

          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db query --linked \
            "update public.app_config set pending_version = '$VERSION_NAME', updated_at = now() where id = 1;"
          echo "Staged pending_version=$VERSION_NAME — run the 'Publish app version' workflow once the Play rollout is live to show the update prompt."

  ios:
    runs-on: macos-15
    needs: [prepare, web-build]
    env:
      ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      # Bundle ids + App Store provisioning-profile names — app AND the Live
      # Activity widget extension (an embedded target with its own bundle id, so
      # the archive signs with TWO profiles, both created fresh each run by the
      # "Create App Store provisioning profiles" step). CI never touches Xcode's
      # automatic-development-signing path that mints a throwaway,
      # certificate-capped Apple Development cert per run. The per-target
      # profile SELECTION lives in the pbxproj Release configs
      # (PROVISIONING_PROFILE_SPECIFIER) — a CLI override would apply one
      # profile to both targets — so keep these in sync with
      # PRODUCT_BUNDLE_IDENTIFIER + PROVISIONING_PROFILE_SPECIFIER there and
      # with the script's defaults.
      IOS_BUNDLE_ID: solutions.camboulive.run
      APPSTORE_PROFILE_NAME: Running Coach App Store CI
      IOS_WIDGET_BUNDLE_ID: solutions.camboulive.run.widgets
      WIDGET_PROFILE_NAME: Running Coach Widget App Store CI
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download web bundle
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: native-web-dist
          path: dist

      # App Store uploads require Xcode 26+ (Apple's April 2026 floor); the
      # macos-15 image still DEFAULTS to Xcode 16.x, so select explicitly.
      - name: Select Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode 26.x on this runner image — App Store uploads require Xcode 26+. Bump the runner image or the glob."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Sync Capacitor
        run: npx cap sync ios

      # Cache the SPM package clones (Capacitor + plugin packages) so xcodebuild
      # skips the resolve/clone on warm runs — worth real money at the macOS ×10
      # minute multiplier. Keyed on the synced CapApp-SPM manifest (cap sync
      # rewrites it from package-lock.json, which is why this step sits AFTER
      # Sync Capacitor). Deliberately NOT caching DerivedData: its invalidation
      # is unreliable and the caches are huge for a small win. The repo name is
      # part of the key because SwiftPM bakes the runner's absolute workspace
      # path (which contains the repo name) into SourcePackages state — a cache
      # from before a repo rename fails the archive with "no XCFramework found
      # at /Users/runner/work/<old-name>/...".
      - name: Cache SPM packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ios/SourcePackages
          key: spm-${{ runner.os }}-${{ github.event.repository.name }}-${{ hashFiles('ios/App/CapApp-SPM/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-${{ github.event.repository.name }}-

      # CFBundleShortVersionString from the resolved release version (prepare
      # job); CFBundleVersion uses the same offset run_number*1000+run_attempt
      # scheme as Android's versionCode — TestFlight rejects a re-used build
      # number per version string exactly like Play. (iOS has no legacy uploads,
      # but keeping the two schemes identical means one mental model and room
      # for the same workflow-rename trap later.)
      - name: Compute version name
        id: ver
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.version }}
        run: |
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          RUN_OFFSET=1000
          echo "build=$(( (GITHUB_RUN_NUMBER + RUN_OFFSET) * 1000 + GITHUB_RUN_ATTEMPT ))" >> "$GITHUB_OUTPUT"

      # App Store Connect API key: -allowProvisioningUpdates lets Xcode
      # create/refresh provisioning profiles via the API key (role must be
      # Admin — cloud signing operations fail with "Cloud signing permission
      # error" on App Manager keys). Certificates are NOT cloud-managed here —
      # see the distribution-certificate step below for why.
      - name: Install App Store Connect API key
        run: |
          if [ -z "$ASC_API_KEY_P8_BASE64" ] || [ -z "$ASC_API_KEY_ID" ] || [ -z "$ASC_API_ISSUER_ID" ]; then
            echo "::error::ASC_API_KEY_P8_BASE64 / ASC_API_KEY_ID / ASC_API_ISSUER_ID secrets are not all set — create an App Store Connect API key (role: Admin — cloud-managed signing needs certificate access App Manager keys lack) and add them."
            exit 1
          fi
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8_BASE64" | base64 -d > ~/private_keys/AuthKey_"$ASC_API_KEY_ID".p8

      # Apple's cloud-managed "Distribution Managed" certificate produces IPAs
      # that App Store Connect REJECTS with "Invalid Signature" when the app
      # embeds frameworks — and Capacitor apps always embed Capacitor.framework
      # + Cordova.framework (known defect: developer.apple.com/forums/thread/815235).
      # The reliable fix is a MANUALLY created Apple Distribution certificate
      # imported into a throwaway keychain: BOTH the archive and the export
      # re-sign with this local cert (manual distribution signing — see the
      # Archive step for why the archive no longer uses automatic development
      # signing). Mint/renew the cert with `npm run ios:dist-cert`
      # (scripts/ios-dist-cert.mjs — uses the same ASC .p8, needs no Mac; certs
      # last 1 year and expiry only blocks NEW uploads), then set the
      # APPLE_DIST_CERT_P12_BASE64 + APPLE_DIST_CERT_PASSWORD secrets it prints.
      # Imported on every run (the archive signs with it even on a dry-run, which
      # is how a dry-run dispatch smoke-tests signing); the upload is what needs a
      # real release, gated separately below.
      - name: Install Apple Distribution certificate
        env:
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          IS_RELEASE: ${{ needs.prepare.outputs.is_release }}
        run: |
          if [ -z "$APPLE_DIST_CERT_P12_BASE64" ]; then
            if [ "$IS_RELEASE" = "true" ]; then
              echo "::error::APPLE_DIST_CERT_P12_BASE64 / APPLE_DIST_CERT_PASSWORD secrets are not set — the TestFlight upload needs a manually created Apple Distribution certificate (Apple's cloud-managed cert is rejected with 'Invalid Signature' on apps with embedded frameworks)."
              exit 1
            fi
            echo "No distribution certificate configured — skipping (dry-run builds don't upload)."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/dist-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_DIST_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/dist-cert.p12"
          security import "$RUNNER_TEMP/dist-cert.p12" -P "$APPLE_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/dist-cert.p12"
          # Allow codesign to use the imported key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # Create/refresh the App Store provisioning profile the archive is signed
      # with, and install it locally. This is what lets the archive use MANUAL
      # distribution signing (see the Archive step) instead of Xcode's automatic
      # development signing — the latter minted a throwaway Apple DEVELOPMENT
      # certificate on every ephemeral runner, and those piled up until the team
      # hit Apple's certificate cap and the archive failed ("reached the maximum
      # number of certificates"). App Store profiles are NOT capped, so
      # regenerating one each run is free and keeps it bound to the current
      # distribution cert(s). No new secrets — reuses the ASC API key.
      - name: Create App Store provisioning profiles
        run: node scripts/ios-appstore-profile.mjs
        env:
          BUNDLE_ID: ${{ env.IOS_BUNDLE_ID }}
          PROFILE_NAME: ${{ env.APPSTORE_PROFILE_NAME }}
          WIDGET_BUNDLE_ID: ${{ env.IOS_WIDGET_BUNDLE_ID }}
          WIDGET_PROFILE_NAME: ${{ env.WIDGET_PROFILE_NAME }}

      # Archive with MANUAL Apple Distribution signing against the profile the
      # step above installed. This deliberately replaces the old automatic
      # development signing: automatic signing on an ephemeral runner created a
      # fresh Apple Development certificate every run (the keychain starts empty),
      # which accumulated to Apple's cap. Manual distribution signing reuses the
      # imported .p12 and never creates a certificate. Because signing is fully
      # manual here (style + identity + profile all pinned), there is no
      # "conflicting provisioning settings" clash — that error only happens when
      # an identity is forced while the style stays Automatic. No
      # -allowProvisioningUpdates: nothing to provision at build time now.
      # PROVISIONING_PROFILE_SPECIFIER is deliberately NOT a CLI override any
      # more: CLI overrides are global across targets, and the archive now signs
      # TWO targets (app + widget extension) with different bundle ids —
      # a single global specifier breaks whichever target it doesn't match. The
      # per-target specifiers live in the pbxproj Release configs; style,
      # identity and team stay CLI-pinned (identical for both targets).
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            -clonedSourcePackagesDirPath ios/SourcePackages \
            archive \
            MARKETING_VERSION="${{ steps.ver.outputs.name }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcbeautify --renderer github-actions

      # Export + upload in one step: destination "upload" hands the build to
      # App Store Connect / TestFlight processing directly (xcodebuild's
      # supported upload path; altool is deprecated). Only on a real release —
      # a dry-run dispatch stops after proving the archive builds and signs.
      # Manual signing here too, using the same imported distribution cert +
      # App Store profile as the archive — so export never falls back to
      # cloud-managed signing either. -authenticationKey* still authenticates the
      # UPLOAD to App Store Connect (destination "upload"), which is separate from
      # signing.
      - name: Write export options
        run: |
          cat > build/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key><string>${APPSTORE_PROFILE_NAME}</string>
              <key>${IOS_WIDGET_BUNDLE_ID}</key><string>${WIDGET_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Upload to TestFlight
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist build/exportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/private_keys/AuthKey_"$ASC_API_KEY_ID".p8 \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            | xcbeautify --renderer github-actions

      # The iOS twin of the Android staging step — only after the TestFlight
      # upload succeeded, and only the *_ios column. As on Android, this stages
      # the version for the manual "Publish app version" workflow; it does not
      # show the update prompt (App Store review hasn't even started yet).
      - name: Validate version name
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        uses: ./.github/actions/validate-app-version
        with:
          version: ${{ steps.ver.outputs.name }}

      - name: Stage iOS version in Supabase (pending publish)
        if: ${{ needs.prepare.outputs.is_release == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add a Supabase personal/service access token with database query rights on run-app."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo variable is not set."
            exit 1
          fi

          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db query --linked \
            "update public.app_config set pending_version_ios = '$VERSION_NAME', updated_at = now() where id = 1;"
          echo "Staged pending_version_ios=$VERSION_NAME — run the 'Publish app version' workflow once the App Store release is live to show the update prompt."

  # Stamp the release: create the v* tag (dispatch path) and a GitHub Release
  # with auto-generated notes. Runs once at least one store shipped, so a fully
  # failed release leaves no dangling tag; a partial one is still recorded (the
  # per-store app_config pending columns already reflect exactly what went out).
  # A GITHUB_TOKEN-created tag does NOT recursively re-trigger the push: tags
  # path, so the dispatch release still runs exactly once.
  tag:
    runs-on: ubuntu-latest
    needs: [prepare, android, ios]
    if: >-
      ${{ always()
      && needs.prepare.outputs.is_release == 'true'
      && (needs.android.result == 'success' || needs.ios.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          # A tag push already has a tag; a dispatch does not. gh release create
          # creates the tag at $GITHUB_SHA if missing, or attaches to the
          # existing one. Skip if a Release already exists (idempotent re-runs).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it as-is."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
          echo "Created GitHub Release $TAG"
