name: CI

# Lint + unit tests + the offline coach-agent eval. The eval uses scripted model
# turns, so CI never calls Anthropic and needs no secrets.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5

      - name: Typecheck
        run: npm run typecheck:all

      - name: Test
        run: npm test

      - name: Offline coach eval
        run: npm run eval
