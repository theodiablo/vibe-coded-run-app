name: CI

# Lint + unit tests + the coach-agent golden eval. Fully offline: the eval drives
# generateProposal with injected fixtures, so there are no Anthropic calls and no
# secrets are needed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (includes the coach-agent golden eval)
        run: npm test
